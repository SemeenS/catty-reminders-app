name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Start application
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8181 > app.log 2>&1 &
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:8181 && break
            sleep 1
          done

      - name: Run tests
        run: |
          set +e
          python -m pytest -v --browser chromium tests | tee test_result
          code=${PIPESTATUS[0]}
          echo "" >> test_result
          echo "===== app.log =====" >> test_result
          cat app.log >> test_result
          exit $code

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_result
          path: test_result
